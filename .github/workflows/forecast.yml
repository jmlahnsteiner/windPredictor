name: Wind Forecast

on:
  # Six daily runs at CET times (UTC+1 in winter, UTC+2 in summer).
  # Cron times below target CET (UTC+1); in CEST (summer) they fire 1 h later locally.
  schedule:
    - cron: '0  4 * * *'  # 05:00 CET  / 06:00 CEST
    - cron: '0  6 * * *'  # 07:00 CET  / 08:00 CEST
    - cron: '0  9 * * *'  # 10:00 CET  / 11:00 CEST
    - cron: '0 12 * * *'  # 13:00 CET  / 14:00 CEST
    - cron: '0 17 * * *'  # 18:00 CET  / 19:00 CEST
    - cron: '0 21 * * *'  # 22:00 CET  / 23:00 CEST

  workflow_dispatch:        # also triggerable manually from the Actions tab

jobs:
  forecast:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to push index.html back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore model weights from the previous run.
      # The run_id key ensures a fresh save each time; restore-keys picks
      # the most recent available cache when no exact match exists.
      # data.parquet lives in the repo (committed each run).
      # predictions history lives in Supabase (SUPABASE_DB_URL secret).
      # Only the model weights need caching — they change rarely (retrain only
      # when absent) and are too large to commit on every deploy.
      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: model/weights.joblib
          key: wind-model-${{ github.run_id }}
          restore-keys: wind-model-

      - name: Download weather data
        # data.parquet already contains full history (committed to repo).
        # Only download recent days + today (always re-fetched for latest readings).
        # On first run (no model weights) pull 90 days so training has enough history.
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          if [ -f model/weights.joblib ]; then
            START=$(date -u -d '3 days ago' '+%Y-%m-%d')
          else
            START=$(date -u -d '90 days ago' '+%Y-%m-%d')
          fi
          python input/scraper.py "$START" "$TODAY"

      - name: Stitch xlsx → parquet
        run: python input/stitcher.py

      - name: Train model (only when weights are absent)
        run: |
          if [ ! -f model/weights.joblib ]; then
            echo "No weights found — training from scratch."
            python model/train.py
          else
            echo "Weights present — skipping training."
          fi

      - name: Predict
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python model/predict.py

      - name: Render HTML
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python render_html.py

      - name: Commit and push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          [ -f data.parquet ] && git add data.parquet || true
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "forecast: update $(date -u '+%d %b %Y %H:%M UTC')"
            git push
          fi
