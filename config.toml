[sailing]
# Sailing window (local time)
window_start = "08:00"
window_end   = "16:00"
# Good-conditions thresholds
wind_speed_min          = 2.0   # knots
wind_speed_max          = 12.0  # knots
# Max circular range of wind direction over the consistency window.
# 90° was too permissive — let December katabatic drainage winds through.
# 45° captures real thermal wind while filtering winter drift wind.
wind_dir_consistency_max = 55.0
consistency_window_hours = 0.75
# Minimum air temperature for a "good sailing" instant.
# Excludes winter days where wind thresholds are technically met but
# nobody is on the water. Set to null (or remove) to disable.
min_temperature = 5.0          # °C

[prediction]
# A day is "good" if at least this fraction of the sailing window has good conditions.
min_good_fraction = 0.25

[paths]
data_parquet     = "data.parquet"
model_file       = "model/weights.joblib"
predictions_file = "predictions.json"

[model]
n_estimators    = 300
max_depth       = 6
min_samples_leaf = 2

[location]
# Coordinates for NWP forecast enrichment via Open-Meteo (no API key needed).
name = "Traunsee"
lat  = 47.8071    # decimal degrees, positive = North
lon  = 13.7790    # decimal degrees, positive = East

[ecowitt]
# Ecowitt weather station credentials.
# Override with ECOWITT_DEVICE_ID / ECOWITT_AUTHORIZE env vars (or .env).
device_id = "cHF5MGpPMzZFeDEvbFAvL2J6QjBWdz09"
authorize = "E6K45F"
